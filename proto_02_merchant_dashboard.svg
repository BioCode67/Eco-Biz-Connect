  <rect x="840" y="516" width="58" height="20" rx="10" fill="#dcfce7"/>
  <text x="869" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">78  B+</text>

  <!-- Figure label -->
  <text x="580" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Figure 4.2 — Merchant Dashboard with AI Analysis Report (Web Application)</text>
