<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600">
  <rect width="960" height="600" fill="#f0f4f8"/>

  <!-- Left panel background -->
  <rect x="0" y="0" width="440" height="600" fill="#1a3a5c"/>

  <!-- Brand panel decorative circles -->
  <circle cx="80" cy="80" r="120" fill="#204870" opacity="0.5"/>
  <circle cx="400" cy="520" r="160" fill="#204870" opacity="0.4"/>

  <!-- EBC Logo area -->
  <rect x="60" y="60" width="44" height="44" rx="10" fill="#3b82f6"/>
  <text x="82" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">E</text>
  <text x="120" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Eco-Biz Connect</text>
  <text x="120" y="96" font-family="Arial, sans-serif" font-size="10" fill="#90b8d8">AI &amp; ESG Financial Platform</text>

  <!-- Tagline -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Empowering Businesses,</text>
  <text x="60" y="228" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#7dd3fc">Sustaining the Planet.</text>
  <text x="60" y="268" font-family="Arial, sans-serif" font-size="12" fill="#90b8d8">AI-driven business analytics and</text>
  <text x="60" y="284" font-family="Arial, sans-serif" font-size="12" fill="#90b8d8">blockchain carbon investment — in one platform.</text>

  <!-- Feature bullets -->
  <rect x="60" y="320" width="4" height="4" rx="2" fill="#3b82f6"/>
  <text x="74" y="327" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">AI Sales Forecasting &amp; Cost Optimization</text>
  <rect x="60" y="346" width="4" height="4" rx="2" fill="#22c55e"/>
  <text x="74" y="353" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">ESG Score &amp; Preferential Loan Matching</text>
  <rect x="60" y="372" width="4" height="4" rx="2" fill="#f59e0b"/>
  <text x="74" y="379" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Carbon-Neutral STO Fractional Investment</text>
  <rect x="60" y="398" width="4" height="4" rx="2" fill="#a78bfa"/>
  <text x="74" y="405" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Blockchain Proof of Ownership &amp; Dividends</text>

  <!-- Bottom note -->
  <text x="60" y="570" font-family="Arial, sans-serif" font-size="10" fill="#64748b">© 2026 Eco-Biz Connect. All rights reserved.</text>

  <!-- Right panel — login form -->
  <rect x="440" y="0" width="520" height="600" fill="white"/>

  <!-- Form container -->
  <rect x="510" y="80" width="380" height="440" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="700" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Welcome Back</text>
  <text x="700" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Sign in to your EBC account</text>

  <!-- Tab: Merchant / Investor -->
  <rect x="530" y="182" width="168" height="32" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="614" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6">Merchant</text>
  <rect x="702" y="182" width="168" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="786" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Investor</text>

  <!-- Email field -->
  <text x="530" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">Email Address</text>
  <rect x="530" y="248" width="340" height="38" rx="6" fill="white" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="548" y="272" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">merchant@example.com</text>

  <!-- Password field -->
  <text x="530" y="308" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">Password</text>
  <rect x="530" y="316" width="340" height="38" rx="6" fill="white" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="548" y="340" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">••••••••••••</text>
  <!-- Eye icon placeholder -->
  <circle cx="854" cy="335" r="8" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
  <circle cx="854" cy="335" r="3" fill="#9ca3af"/>

  <!-- Forgot password -->
  <text x="870" y="374" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">Forgot password?</text>

  <!-- Login button -->
  <rect x="530" y="384" width="340" height="42" rx="8" fill="#3b82f6"/>
  <text x="700" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Sign In</text>

  <!-- Divider -->
  <line x1="530" y1="444" x2="668" y2="444" stroke="#e2e8f0" stroke-width="1"/>
  <text x="700" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">or</text>
  <line x1="732" y1="444" x2="870" y2="444" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Register link -->
  <text x="700" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Don't have an account?</text>
  <text x="700" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6">Create Account →</text>

  <!-- Figure label -->
  <text x="700" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Figure 4.1 — Login Page (Web Application)</text>
</svg>
